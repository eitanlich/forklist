<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fork F: La F es un tenedor visto de arriba -->
  <!-- Mango (palo vertical de la F) -->
  <rect x="7" y="12" width="5" height="16" rx="2" fill="#D4A574"/>
  <!-- Los 3 dientes del tenedor (parte superior, forman la parte de arriba de la F) -->
  <rect x="7" y="4" width="3" height="10" rx="1" fill="#D4A574"/>
  <rect x="12" y="4" width="3" height="10" rx="1" fill="#D4A574"/>
  <rect x="17" y="4" width="3" height="10" rx="1" fill="#D4A574"/>
  <!-- Barra conectora de los dientes -->
  <rect x="7" y="12" width="13" height="3" rx="1" fill="#D4A574"/>
</svg>