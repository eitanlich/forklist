<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Tenedor horizontal v3 - super clean, F obvia -->
  <g stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mango redondeado -->
    <line x1="3" y1="16" x2="10" y2="16"/>
    <!-- Stem vertical -->
    <line x1="10" y1="6" x2="10" y2="26"/>
    <!-- Diente top (barra superior F) -->
    <line x1="10" y1="6" x2="26" y2="6"/>
    <!-- Diente mid (barra media F) -->
    <line x1="10" y1="16" x2="21" y2="16"/>
  </g>
</svg>